name: prenava_mobile
description: "Prenava - Pregnancy Health & Wellness App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  carousel_slider: ^5.0.0
  dio: ^5.9.0
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.2.2

  flutter_riverpod: ^2.6.1

  flutter_secure_storage: ^10.0.0
  fpdart: ^1.2.0
  go_router: ^17.1.0
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  latlong2: ^0.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  showcaseview: ^3.0.0
  url_launcher: ^6.3.2
  permission_handler: ^11.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  shimmer: ^3.0.0
  flutter_markdown: ^0.7.5
  flutter_animate: ^4.5.2
  dotted_border: ^3.1.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  share_plus: ^10.1.4
  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.6.4
  riverpod_annotation: ^2.6.1

  very_good_analysis: ^10.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  image_path: assets/images/prenava_logo.png
  android: true
  ios: true
  remove_alpha_ios: true