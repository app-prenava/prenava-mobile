name: prenava_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  carousel_slider: ^5.0.0
  dio: ^5.9.0
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_riverpod: ^3.0.3
  flutter_secure_storage: ^10.0.0
  fpdart: ^1.2.0
  go_router: ^17.1.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  latlong2: ^0.9.0
  shared_preferences: ^2.3.3
  showcaseview: ^3.0.0
  url_launcher: ^6.3.2
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.7.1
  riverpod_generator: ^4.0.3
  very_good_analysis: ^10.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

# Launcher icon configuration
flutter_launcher_icons:
  image_path: assets/images/prenava_logo.png
  android: true
  ios: true
  remove_alpha_ios: true
